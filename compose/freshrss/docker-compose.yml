services:
  # FreshRSS — self-hosted RSS/Atom feed aggregator with a web reader and a
  # built-in refresh cron. Subscribe to any feeds (including this stack's own
  # OPDS/RSS sources) and read them on the LAN or over the WARP tunnel. Uses
  # SQLite by default, so there's no separate database container — pick SQLite
  # in the first-run web installer.
  freshrss:
    image: lscr.io/linuxserver/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ${STORAGE_ROOT:-../../data}/freshrss/config:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
