# AppFlowy-Cloud internal path router (adapted from upstream nginx/nginx.conf).
#
# This nginx lives INSIDE the appflowy compose network and only does path-based
# routing between AppFlowy's services (gotrue / api / ws / minio / console /
# web). TLS is handled one layer up by the stack's Caddy reverse proxy, so this
# config listens on plain :80 only — the upstream's 443 listener and ssl_*
# mounts are removed (no cert files to manage here).
#
# Caddy proxies  flowy.{$DOMAIN}  ->  this nginx (host port APPFLOWY_PORT).
#
# NOTE (podman): upstream uses `set $backend "http://name"` + `proxy_pass
# $backend` together with `resolver 127.0.0.11` (Docker's embedded DNS). That
# resolver does not exist under rootless podman, so every route 502s. We use
# plain literal hostnames in proxy_pass instead — nginx resolves them once at
# startup via the container's /etc/resolv.conf (podman's aardvark-dns), which
# needs no resolver directive and works on Docker too.
# Upstream reference: https://github.com/AppFlowy-IO/AppFlowy-Cloud/blob/main/nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        client_max_body_size 10M;
        underscores_in_headers on;

        # GoTrue (auth)
        location /gotrue/ {
            proxy_pass http://gotrue:9999;
            rewrite ^/gotrue(/.*)$ $1 break;
            proxy_set_header Host $http_host;
            proxy_pass_request_headers on;
        }

        # WebSocket (realtime collaboration)
        location /ws {
            proxy_pass http://appflowy_cloud:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        location /api {
            proxy_pass http://appflowy_cloud:8000;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Host $http_host;

            location ~* ^/api/workspace/([a-zA-Z0-9_-]+)/publish$ {
                proxy_pass http://appflowy_cloud:8000;
                proxy_request_buffering off;
                client_max_body_size 256M;
            }

            # Server-sent events for AI chat — must not be buffered.
            location /api/chat {
                proxy_pass http://appflowy_cloud:8000;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                chunked_transfer_encoding on;
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 600s;
                proxy_connect_timeout 600s;
                proxy_send_timeout 600s;
            }

            # Notion/Markdown import — large uploads.
            location /api/import {
                proxy_pass http://appflowy_cloud:8000;
                proxy_set_header X-Request-Id $request_id;
                proxy_set_header Host $http_host;
                proxy_read_timeout 600s;
                proxy_connect_timeout 600s;
                proxy_send_timeout 600s;
                proxy_request_buffering off;
                proxy_buffering off;
                proxy_cache off;
                client_max_body_size 2G;
            }
        }

        # MinIO web console (reachable at /minio via the admin portal)
        location /minio/ {
            proxy_pass http://minio:9001;
            rewrite ^/minio/(.*) /$1 break;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;
            real_ip_header X-Real-IP;
            proxy_connect_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            chunked_transfer_encoding off;
        }

        # MinIO S3 API for presigned URLs exposed to AppFlowy clients.
        # Host MUST be the internal host the URL was signed against.
        location /minio-api/ {
            proxy_pass http://minio:9000;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/minio-api/(.*) /$1 break;
            proxy_connect_timeout 300s;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
            client_max_body_size 0;
        }

        # AI passthrough
        location /ai/ {
            proxy_pass http://appflowy_cloud:8000;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin console (user management)
        location /console {
            proxy_pass http://admin_frontend:3000;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Scheme $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # AppFlowy Web UI (everything else)
        location / {
            proxy_pass http://appflowy_web:80;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header Host $host;
        }
    }
}
