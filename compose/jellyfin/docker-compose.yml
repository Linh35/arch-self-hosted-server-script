services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "8096:8096"
    volumes:
      - ../../data/jellyfin/config:/config
      - ../../data/jellyfin/cache:/cache
      - ../../data/jellyfin/media:/media
    environment:
      - TZ=${TZ:-UTC}
      - JELLYFIN_PublishedServerUrl=https://tv.${DOMAIN:-example.com}
    # Hardware transcoding (uncomment one block if applicable):
    #
    # Intel / AMD (VAAPI):
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - "989"   # match your host's "render" group (getent group render)
    #
    # NVIDIA: install nvidia-container-toolkit, then:
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
