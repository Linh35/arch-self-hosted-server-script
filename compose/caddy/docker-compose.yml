services:
  # Caddy — one front door for the whole stack. Instead of remembering
  # ip:port for each service you reach them by name (music.<domain>,
  # photos.<domain>, ...) over HTTPS. It terminates TLS and reverse-proxies
  # to each service's published port on the host.
  #
  # TLS: defaults to publicly-trusted certs via the Cloudflare DNS-01 challenge
  # (see Caddyfile) so there are no browser warnings (e.g. for Amperfy on iOS).
  # Requires CLOUDFLARE_API_TOKEN below. No Cloudflare / offline? Flip the (tls)
  # snippet in the Caddyfile to `tls internal` for Caddy's built-in CA instead.
  caddy:
    build:
      context: .
      dockerfile: Containerfile
    image: localhost/selfhost-caddy:latest
    container_name: caddy
    restart: unless-stopped
    # Resolve external names (ACME directory, Cloudflare API) via Cloudflare's
    # public DNS directly. Avoids the flaky rootless-podman chain
    # (aardvark -> systemd-resolved 127.0.0.53 -> router), which intermittently
    # timed out and broke ACME cert renewal.
    dns:
      - 1.1.1.1
      - 1.0.0.1
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    # Reach the other stacks' published ports on the host. Each compose project
    # has its own network, so we proxy via the host gateway rather than sharing
    # a network. Override UPSTREAM_HOST with the server's LAN IP if your podman
    # networking doesn't provide host.containers.internal.
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${STORAGE_ROOT:-../../data}/caddy/data:/data       # issued certs + CA
      - ${STORAGE_ROOT:-../../data}/caddy/config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - UPSTREAM_HOST=${UPSTREAM_HOST:-host.containers.internal}
      # Required for the default TLS mode (Cloudflare DNS-01 challenge in the
      # Caddyfile). Only safe to leave blank if you switch that snippet to
      # `tls internal`.
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - TZ=${TZ:-UTC}
