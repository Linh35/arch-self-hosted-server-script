services:
  copyparty:
    image: docker.io/copyparty/ac:latest
    container_name: copyparty
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "3923:3923"
    volumes:
      - ${STORAGE_ROOT:-../../data}/copyparty/files:/w
      - /mnt/storage/calibre/library:/books:ro    # ebooks downloaded via dl-books (read-only)
      - ${STORAGE_ROOT:-../../data}/cwa/ingest:/ingest   # upload books here -> CWA auto-imports them
    environment:
      - TZ=${TZ:-UTC}
    command:
      - -p
      - "3923"
      - -e2dsa
      - -e2ts
      - --daw
      # No accounts: anonymous gets full read/write/move/delete/admin. This stack
      # is LAN + WARP-tunnel only, so the network perimeter is the access control.
      - -v
      - "/w::rwmda"
      # Read-only "books" share: the Calibre library that dl-books fills.
      - -v
      - "/books:books:r"
      # Upload books here (e.g. from a local Calibre) -> CWA auto-imports into read.<domain>.
      - -v
      - "/ingest:book-upload:rwmda"
