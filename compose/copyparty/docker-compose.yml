services:
  copyparty:
    image: copyparty/ac:latest
    container_name: copyparty
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "3923:3923"
    volumes:
      - ${STORAGE_ROOT:-../../data}/copyparty/files:/w
    environment:
      - TZ=${TZ:-UTC}
    command:
      - -p
      - "3923"
      - -e2dsa
      - -e2ts
      - --daw
      # No accounts: anonymous gets full read/write/move/delete/admin. This stack
      # is LAN + WARP-tunnel only, so the network perimeter is the access control.
      - -v
      - "/w::rwmda"
