services:
  # qBittorrent — NO VPN: torrent traffic exits directly on the host's IP.
  # Uses HOST networking: under rootless podman's bridge (pasta), qBittorrent's
  # fixed-source-port UDP got no return traffic, so DHT stayed at 0 nodes and
  # UDP trackers were never contacted -> 0 peers, nothing downloads. On the host
  # netns it behaves like a native client. WebUI is on 8088, torrent port 6881
  # (both bound directly on the host; no port mapping with host networking).
  # To tunnel through a VPN later, drop network_mode and route via gluetun.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${STORAGE_ROOT:-../../data}/arr/qbittorrent/config:/config
      - /mnt/storage/data:/data       # downloads + library on the HDD (hardlinks)
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8088

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    volumes:
      - ${STORAGE_ROOT:-../../data}/arr/prowlarr/config:/config
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-UTC}

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    volumes:
      - ${STORAGE_ROOT:-../../data}/arr/radarr/config:/config
      - /mnt/storage/data:/data
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-UTC}

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    volumes:
      - ${STORAGE_ROOT:-../../data}/arr/sonarr/config:/config
      - /mnt/storage/data:/data
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-UTC}

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    ports:
      - "6767:6767"
    volumes:
      - ${STORAGE_ROOT:-../../data}/arr/bazarr/config:/config
      - /mnt/storage/data:/data
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-UTC}
