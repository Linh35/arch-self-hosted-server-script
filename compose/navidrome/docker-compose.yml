services:
  # Navidrome — music server speaking the Subsonic API, so native clients on
  # iOS (Amperfy, play:Sub), macOS/Linux (Supersonic, Feishin, Tempo) and the
  # built-in web UI can all stream from it. It only reads the music folder;
  # a downloader (spotDL / deemix) writes files there separately.
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "4533:4533"
    volumes:
      - ${STORAGE_ROOT:-../../data}/navidrome/data:/data
      - ${STORAGE_ROOT:-../../data}/music:/music:ro
    environment:
      - TZ=${TZ:-UTC}
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
      - ND_SCANSCHEDULE=1h
      # Navidrome has no anonymous mode, so auto-create the admin on first run
      # (skips the setup wizard). LAN + WARP-tunnel only; override the password
      # in compose/navidrome/.env. Login: admin / <ND admin password>.
      - ND_DEVAUTOCREATEADMINPASSWORD=${NAVIDROME_ADMIN_PASSWORD:-admin}
