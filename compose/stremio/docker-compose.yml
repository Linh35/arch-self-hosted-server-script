services:
  # Stremio — browse movies/shows in a browser, find torrents (via the Torrentio
  # addon), and stream them on the fly. This image bundles BOTH the web UI (:8080)
  # and the streaming server (:11470/:12470) that actually pulls the torrents.
  #
  # NO VPN: torrent traffic exits on this host's public IP. If that's a concern,
  # wrap this in gluetun (see git history for the VPN variant).
  stremio:
    image: tsaridas/stremio-docker:latest
    container_name: stremio
    restart: unless-stopped
    ports:
      - "8181:8080"     # web UI — browse + watch in a browser
      - "11470:11470"   # streaming server (HTTP)
      - "12470:12470"   # streaming server (HTTPS)
    volumes:
      - ${STORAGE_ROOT:-../../data}/stremio:/root/.stremio-server
    environment:
      - TZ=${TZ:-UTC}
      - NO_CORS=1
      # Set to the server's LAN IP so the web UI auto-points the streaming
      # server at this box (not the browser's own localhost).
      - IPADDRESS=${STREMIO_IP:-}
      - AUTO_SERVER_URL=1
