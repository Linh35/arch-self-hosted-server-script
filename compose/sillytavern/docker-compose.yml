services:
  # SillyTavern — LLM chat/roleplay frontend. Connect it to an LLM backend
  # (Claude/OpenAI/local) in its UI. Behind the LAN/WARP perimeter + basic auth.
  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:latest
    container_name: sillytavern
    restart: unless-stopped
    user: "0:0"
    ports:
      - "8000:8000"
    volumes:
      - ${STORAGE_ROOT:-../../data}/sillytavern/config:/home/node/app/config
      - ${STORAGE_ROOT:-../../data}/sillytavern/data:/home/node/app/data
      - ${STORAGE_ROOT:-../../data}/sillytavern/plugins:/home/node/app/plugins
    environment:
      - TZ=${TZ:-UTC}
