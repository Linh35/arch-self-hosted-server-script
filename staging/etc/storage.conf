# The container's own image/container storage lives on top of the outer
# overlay filesystem, so the inner podman must use fuse-overlayfs rather than
# the kernel overlay driver (which can't stack on another overlay). --privileged
# provides /dev/fuse.
[storage]
driver = "overlay"
runroot = "/run/containers/storage"
graphroot = "/var/lib/containers/storage"

[storage.options.overlay]
mount_program = "/usr/bin/fuse-overlayfs"
