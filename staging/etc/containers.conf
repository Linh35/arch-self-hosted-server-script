# Nested-podman engine config for the staging container. No systemd runs in
# this container, so manage cgroups directly (cgroupfs) and log events to a
# file rather than the journal. netavark + aardvark-dns provide container
# networking and name resolution.
[engine]
cgroup_manager = "cgroupfs"
events_logger = "file"

[network]
network_backend = "netavark"
